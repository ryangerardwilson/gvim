name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version env
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build source bundle
        run: |
          set -euo pipefail
          echo "__version__ = \"${VERSION}\"" > _version.py
          mkdir -p dist/gvim
          rsync -av \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'dist' \
            --exclude '.pytest_cache' \
            --exclude '.ruff_cache' \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            ./ dist/gvim/
          tar -C dist -czf gvim-linux-x64.tar.gz gvim

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            gvim-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
